    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #111827, #1e293b);
            min-height: 100vh;
        }

        .glass {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body class="flex items-center justify-center p-4 text-white">
    <div class="glass w-full max-w-5xl rounded-3xl shadow-2xl p-6 md:p-10">
        <!-- Heading -->
        <div class="text-center mb-8">
            <h1
                class="text-3xl md:text-4xl font-bold bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">
                Qoutation Form
            </h1>
            <p class="text-gray-300 mt-2">Fill details carefully</p>
        </div>

        <!-- Form -->
        <form id="quotationForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Customer Name -->
            <div>
                <label class="block mb-2 text-sm font-medium">Customer Name</label>
                <input type="text" placeholder="Enter customer name" id="customer_name"
                    class="w-full rounded-xl bg-slate-800/70 border border-slate-600 px-4 py-3 outline-none focus:ring-2 focus:ring-cyan-400" />
            </div>

            <!-- Address -->
            <div class="md:col-span-2">
                <label class="block mb-2 text-sm font-medium">Customer Address</label>
                <textarea placeholder="Enter address" id="customer_address"
                    class="w-full rounded-xl bg-slate-800/70 border border-slate-600 px-4 py-3 outline-none focus:ring-2 focus:ring-cyan-400"></textarea>
            </div>

            <!-- Phone No -->
            <div>
                <label class="block mb-2 text-sm font-medium">Customer Phone No</label>
                <input type="tel" placeholder="Enter phone number" id="customer_phone"
                    class="w-full rounded-xl bg-slate-800/70 border border-slate-600 px-4 py-3 outline-none focus:ring-2 focus:ring-cyan-400" />
            </div>

            <!-- Model -->
            <div>
                <label class="block mb-2 text-sm font-medium">Model</label>
                <select id="model"
                    class="w-full rounded-xl bg-slate-800/70 border border-slate-600 px-4 py-3 outline-none focus:ring-2 focus:ring-cyan-400">
                    <option value="">
                        Select Model
                    </option>
                </select>
            </div>

            <!-- Variant -->
            <div>
                <select id="variant"
                    class="w-full rounded-xl bg-slate-800/70 border border-slate-600 px-4 py-3 outline-none focus:ring-2 focus:ring-cyan-400">
                    <option value="">
                        Select Variant
                    </option>
                </select>
            </div>

            <!-- Color -->
            <div>
                <label class="block mb-2 text-sm font-medium">Color</label>
                <input type="text" placeholder="Enter color" id="color"
                    class="w-full rounded-xl bg-slate-800/70 border border-slate-600 px-4 py-3 outline-none focus:ring-2 focus:ring-cyan-400" />
            </div>

            <!-- KEC Name -->
            <div>
                <label class="block mb-2 text-sm font-medium">KEC Name</label>
                <input type="text" id="kec_name" placeholder="Enter KEC name"
                    class="w-full rounded-xl bg-slate-800/70 border border-slate-600 px-4 py-3 outline-none focus:ring-2 focus:ring-cyan-400" />
            </div>

            <!-- Mobile -->
            <div>
                <label class="block mb-2 text-sm font-medium">KEC Mobile</label>
                <input type="tel" id="kec_mobile" placeholder="Enter mobile number"
                    class="w-full rounded-xl bg-slate-800/70 border border-slate-600 px-4 py-3 outline-none focus:ring-2 focus:ring-cyan-400" />
            </div>

            <!-- Email -->
            <div>
                <label class="block mb-2 text-sm font-medium">Customer Email</label>
                <input type="email" id="customer_email" placeholder="Customer email (Optional)"
                    class="w-full rounded-xl bg-slate-800/70 border border-slate-600 px-4 py-3 outline-none focus:ring-2 focus:ring-cyan-400" />
            </div>

            <!-- Date -->
            <div>
                <label class="block mb-2 text-sm font-medium">Date</label>
                <input type="date" id="todayDate"
                    class="w-full rounded-xl bg-slate-800/70 border border-slate-600 px-4 py-3 outline-none focus:ring-2 focus:ring-cyan-400" />
            </div>

            <!-- Submit -->
            <div class="md:col-span-2 mt-4">
                <button type="submit"
                    class="w-full rounded-xl bg-gradient-to-r from-cyan-500 to-blue-600 py-3 text-lg font-semibold hover:scale-[1.02] transition-all duration-300 shadow-lg shadow-cyan-500/20">
                    Submit Form
                </button>
            </div>
        </form>
    </div>

    <script>

        window.addEventListener("DOMContentLoaded", () => {

            // TODAY DATE
            const today = new Date()
                .toISOString()
                .split("T")[0];

            document.getElementById("todayDate").value =
                today;

            // SELECTS
            const modelSelect =
                document.getElementById("model");

            const variantSelect =
                document.getElementById("variant");

            // UNIQUE MODELS
            const uniqueModels = [
                ...new Set(
                    carData.map(car => car.model)
                )
            ];

            // LOAD MODELS
            uniqueModels.forEach(model => {

                const option =
                    document.createElement("option");

                option.value = model;
                option.textContent = model;

                modelSelect.appendChild(option);

            });

            // MODEL CHANGE
            modelSelect.addEventListener("change", function () {

                const selectedModel = this.value;

                // RESET VARIANTS
                variantSelect.innerHTML =
                    `<option value="">Select Variant</option>`;

                // FILTER
                const filteredCars =
                    carData.filter(
                        car => car.model === selectedModel
                    );

                // LOAD VARIANTS
                filteredCars.forEach(car => {

                    const option =
                        document.createElement("option");

                    // SAVE FULL OBJECT
                    option.value =
                        JSON.stringify(car);

                    // SHOW TEXT
                    option.textContent =
                        car.variant + " | " + car.fuel;

                    variantSelect.appendChild(option);

                });

            });

            // SUBMIT
            document
                .getElementById("quotationForm")
                .addEventListener("submit", function (e) {

                    e.preventDefault();

                    // CHECK
                    if (!variantSelect.value) {

                        alert("Please select variant");

                        return;
                    }

                    // FULL OBJECT
                    const selectedCar =
                        JSON.parse(
                            variantSelect.value
                        );

                    // URL PARAMS
                    const params =
                        new URLSearchParams({

                            customer_name:
                                document.getElementById("customer_name").value,

                            customer_address:
                                document.getElementById("customer_address").value,

                            customer_phone:
                                document.getElementById("customer_phone").value,

                            customer_email:
                                document.getElementById("customer_email").value,

                            kec_name:
                                document.getElementById("kec_name").value,

                            kec_mobile:
                                document.getElementById("kec_mobile").value,

                            quotation_date:
                                document.getElementById("todayDate").value,

                            color:
                                document.getElementById("color").value,

                            model:
                                selectedCar.model,

                            variant:
                                selectedCar.variant,

                            fuel:
                                selectedCar.fuel,

                            description:
                                selectedCar.description,

                            ex_showroom:
                                selectedCar.ex_showroom,

                            insurance:
                                selectedCar.insurance,

                            registration:
                                selectedCar.registration_charges,

                            temp_registration:
                                selectedCar.temp_registration,

                            accessories:
                                selectedCar.accessories_kit,

                            extended_warranty:
                                selectedCar.extended_warranty,

                            tcs:
                                selectedCar.tcs,

                            fastag:
                                selectedCar.fastag,

                            on_road:
                                selectedCar.on_road_price

                        });

                    // REDIRECT
                    window.location.href =
                        "https://ritesh-kec-1.blogspot.com?"
                        + params.toString();

                });

        });

    </script>
